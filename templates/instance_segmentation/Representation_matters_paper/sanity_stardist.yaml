PROBLEM:
    TYPE: INSTANCE_SEG
    NDIM: 2D
    INSTANCE_SEG:
        DATA_CHANNELS: ['Db', 'R']
        CHANNELS_PER_HEAD_INFO: [1, 32] 
        DATA_CHANNEL_WEIGHTS: [1, 0.2]
        DATA_CHANNELS_EXTRA_OPTS: [{'Db': {'mask_values': False}}]
        CLASS_REBALANCE_WITHIN_CHANNELS: True
        INSTANCE_CREATION_PROCESS: "stardist"
        STARDIST:
            PROB_THRESH: 0.5
            NMS_IOU_THRESH: 0.4
DATA: 
    PATCH_SIZE: (256, 256, 1)  
    REFLECT_TO_COMPLETE_SHAPE: True
    NORMALIZATION:
      TYPE: 'scale_range'
      PERC_CLIP:
          ENABLE: True
          LOWER_PERC: 1.0
          UPPER_PERC: 99.8

    TRAIN:                                                                                                              
        PATH: /data/dfranco/datasets/dsb2018/train/images
        GT_PATH: /data/dfranco/datasets/dsb2018/train/masks
        IN_MEMORY: True
        CHECK_DATA: True
    VAL:
        FROM_TRAIN: True
        IN_MEMORY: True
        SPLIT_TRAIN: 0.1
    TEST:                                                                                                               
        PATH: /data/dfranco/datasets/dsb2018/test/images
        GT_PATH: /data/dfranco/datasets/dsb2018/test/masks
        IN_MEMORY: False
        LOAD_GT: True
        PADDING: (32, 32)

AUGMENTOR:
    ENABLE: True
    ROT90: True                                                                                                    
    VFLIP: True                                                                                                         
    HFLIP: True                                                                                                                                                

MODEL:
  ARCHITECTURE: unet
  FEATURE_MAPS: [32, 64, 128, 256]
  LOAD_CHECKPOINT: False

TRAIN:
    ENABLE: True
    OPTIMIZER: ADAMW
    LR: 0.0002
    BATCH_SIZE: 4
    EPOCHS: 1000
    PATIENCE: 100
    LR_SCHEDULER:                                                                                                       
        NAME: 'warmupcosine'                                                                                            
        MIN_LR: 1.E-5                                                                                                   
        WARMUP_COSINE_DECAY_EPOCHS: 5
  
TEST:
    ENABLE: True
    POST_PROCESSING:
      INSTANCE_REFINEMENT:
        ENABLE: True
        OPERATIONS: ["remove_small_objects"]
        VALUES: [20]
